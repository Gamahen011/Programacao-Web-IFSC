<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 18</title>
    <link rel="stylesheet" href="style18.css">
</head>
<body>
    <h1>Cadastro de estudantes para o JIFSC</h1>
    <form action="#">
        <div>
            <div>
                <label for="name">Nome Completo:</label>
                <input type="text" id="name" placeholder="Digite o seu nome" required> 
            </div>
            <div>
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" maxlength="14" required> 
            </div>
            <div>
                <label for="date">Data de nascimento:</label>
                <input type="date" id="date" required> 
            </div>
            <div>
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" pattern="[0-9]{5}-[0-9]{4}" placeholder="Digite o seu telefone" required> 
            </div>
            <div>
                <label for="mail">E-mail:</label>
                <input type="email" id="mail" placeholder="Digite o seu email" required> 
            </div>
            <div>
                <label for="curso">Nome do curso:</label>
                <input type="text" id="curso" placeholder="Digite o seu curso" required> 
            </div>
            <div>
                <label>Modalidade: <input class="radio" type="radio" name="tipo" value="estudante" required checked>Individual</label>
                <label><input class="radio" type="radio" name="tipo" value="estudante" required checked>Coletivo</label>
            </div>
            <div>
                <label for="checkbox">Ajuda de custos: </label>
                <input class="checkbox" type="checkbox" id="checkbox">
            </div>
            <div class="button">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>
        </div>
    </form>
</body>
</html>
